version: '3.9'

services:
  milady:
    image: ghcr.io/milady-ai/milady:latest
    container_name: milady
    restart: unless-stopped
    ports:
      - "2138:2138"
      - "18789:18789"
    volumes:
      - milady-data:/app/data
      - milady-models:/app/models
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2138/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: milady-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MILADY_HOST=milady
      - MILADY_PORT=2138
      - MILADY_WS_PORT=18789
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - MILADY_API_TOKEN=${MILADY_API_TOKEN:-}
      - RATE_LIMIT_RPM=60
    depends_on:
      milady:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:3001
    container_name: milady-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend

volumes:
  milady-data:
  milady-models:
